services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api
    ports:
      - "${PUBLIC_TEST_PORT:-8088}:80"
      - "${HTTPS_PORT:-8443}:443"
    command: >
      /bin/sh -c 'nginx -g "daemon off;" & pid=$$!;
      while kill -0 $$pid 2>/dev/null; do
        sleep 30;
        current=$$(find /etc/letsencrypt/live /etc/letsencrypt/archive -type f -name "*.pem" -exec stat -c "%n:%Y" {} \; 2>/dev/null | sort | md5sum | cut -d" " -f1);
        if [ "$$current" != "$$last" ]; then
          last=$$current;
          nginx -s reload 2>/dev/null || true;
        fi;
      done;
      wait $$pid'
    volumes:
      - ./infra/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - api_uploads:/var/www/html/storage/app/public:ro
      - ${LETSENCRYPT_CERTS_PATH:-./storage/letsencrypt}:/etc/letsencrypt:ro
      - ${LETSENCRYPT_WEBROOT_PATH:-./storage/certbot}:/var/www/certbot:ro
    networks:
      - cuffmap

  frontend:
    build:
      context: ./frontend
      target: production
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:8088}
      NEXT_PUBLIC_PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-cuffmap.fesselspiel.com}
      NEXT_PUBLIC_PUBLIC_BASE_DOMAINS: ${PUBLIC_BASE_DOMAINS:-cuffmap.fesselspiel.com}
    depends_on:
      - api
    networks:
      - cuffmap

  api:
    build:
      context: ./api
      target: production
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_URL: ${APP_URL:-https://cuffmap.fesselspiel.com}
      PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-cuffmap.fesselspiel.com}
      PUBLIC_BASE_DOMAINS: ${PUBLIC_BASE_DOMAINS:-cuffmap.fesselspiel.com}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-8388608}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN}
      SHOPIFY_ADMIN_API_TOKEN: ${SHOPIFY_ADMIN_API_TOKEN}
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2026-04}
      SHOPIFY_STOREFRONT_BASE_URL: ${SHOPIFY_STOREFRONT_BASE_URL}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}
      INSTAGRAM_GRAPH_ACCESS_TOKEN: ${INSTAGRAM_GRAPH_ACCESS_TOKEN:-}
      INSTAGRAM_BUSINESS_ACCOUNT_ID: ${INSTAGRAM_BUSINESS_ACCOUNT_ID:-}
      INSTAGRAM_API_VERSION: ${INSTAGRAM_API_VERSION:-v23.0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      LETSENCRYPT_WEBROOT: ${LETSENCRYPT_WEBROOT:-/var/www/certbot}
      LETSENCRYPT_CERTBOT_BIN: certbot
      LETSENCRYPT_STAGING: ${LETSENCRYPT_STAGING:-false}
      LETSENCRYPT_TIMEOUT: ${LETSENCRYPT_TIMEOUT:-180}
    volumes:
      - api_uploads:/var/www/html/storage/app/public
      - ${LETSENCRYPT_CERTS_PATH:-./storage/letsencrypt}:/etc/letsencrypt
      - ${LETSENCRYPT_WEBROOT_PATH:-./storage/certbot}:${LETSENCRYPT_WEBROOT:-/var/www/certbot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cuffmap

  queue:
    build:
      context: ./api
      target: production
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN}
      SHOPIFY_ADMIN_API_TOKEN: ${SHOPIFY_ADMIN_API_TOKEN}
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2026-04}
      SHOPIFY_STOREFRONT_BASE_URL: ${SHOPIFY_STOREFRONT_BASE_URL}
      INSTAGRAM_GRAPH_ACCESS_TOKEN: ${INSTAGRAM_GRAPH_ACCESS_TOKEN:-}
      INSTAGRAM_BUSINESS_ACCOUNT_ID: ${INSTAGRAM_BUSINESS_ACCOUNT_ID:-}
      INSTAGRAM_API_VERSION: ${INSTAGRAM_API_VERSION:-v23.0}
      PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-cuffmap.fesselspiel.com}
      PUBLIC_BASE_DOMAINS: ${PUBLIC_BASE_DOMAINS:-cuffmap.fesselspiel.com}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      LETSENCRYPT_WEBROOT: ${LETSENCRYPT_WEBROOT:-/var/www/certbot}
      LETSENCRYPT_CERTBOT_BIN: certbot
      LETSENCRYPT_STAGING: ${LETSENCRYPT_STAGING:-false}
      LETSENCRYPT_TIMEOUT: ${LETSENCRYPT_TIMEOUT:-180}
    volumes:
      - api_uploads:/var/www/html/storage/app/public
      - ${LETSENCRYPT_CERTS_PATH:-./storage/letsencrypt}:/etc/letsencrypt
      - ${LETSENCRYPT_WEBROOT_PATH:-./storage/certbot}:${LETSENCRYPT_WEBROOT:-/var/www/certbot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cuffmap

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuffmap}
      POSTGRES_USER: ${POSTGRES_USER:-cuffmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cuffmap} -d ${POSTGRES_DB:-cuffmap}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cuffmap

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cuffmap

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        trap 'exit 0' TERM;
        while true; do
          for conf in /etc/letsencrypt/renewal/*.conf; do
            [ -f "$$conf" ] || continue;
            grep -Eq '^authenticator *= *webroot' "$$conf" || continue;
            name="$$(basename "$$conf" .conf)";
            certbot renew --cert-name "$$name" --webroot --webroot-path ${LETSENCRYPT_WEBROOT:-/var/www/certbot} --preferred-challenges http --quiet || true;
          done;
          sleep 12h;
        done
    volumes:
      - ${LETSENCRYPT_CERTS_PATH:-./storage/letsencrypt}:/etc/letsencrypt
      - ${LETSENCRYPT_WEBROOT_PATH:-./storage/certbot}:${LETSENCRYPT_WEBROOT:-/var/www/certbot}
    networks:
      - cuffmap

volumes:
  postgres_data:
  redis_data:
  api_uploads:

networks:
  cuffmap:
